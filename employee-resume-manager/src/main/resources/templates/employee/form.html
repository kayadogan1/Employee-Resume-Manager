<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Çalışan Formu')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="card">

        <h1 th:text="${employee.id != null} ? '✏️ Çalışan Düzenle' : '➕ Yeni Çalışan Ekle'"></h1>


        <form th:action="${employee.id != null} ? @{/employees/{id}(id=${employee.id})} : @{/employees}"
              method="post" th:object="${employee}" enctype="multipart/form-data">

            <div class="form-group">
                <label for="firstName">Ad</label>
                <input type="text" id="firstName" th:field="*{firstName}" placeholder="Çalışanın adı" required>
            </div>

            <div class="form-group">
                <label for="lastName">Soyad</label>
                <input type="text" id="lastName" th:field="*{lastName}" placeholder="Çalışanın soyadı" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" th:field="*{email}" placeholder="ornek@sirket.com" required>
            </div>

            <div class="form-group">
                <label for="department">Departman</label>
                <input type="text" id="department" th:field="*{department}" placeholder="Yazılım, İK, Muhasebe vb.">
            </div>

            <div class="form-group">
                <label for="position">Pozisyon</label>
                <input type="text" id="position" th:field="*{position}" placeholder="Kıdemli Geliştirici, Müdür vb.">
            </div>

            <div class="form-group">
                <label for="hireDate">İşe Başlama Tarihi</label>
                <input type="date" id="hireDate" th:field="*{hireDate}">
            </div>

            <!-- CV Yükleme - sadece yeni çalışan eklerken göster -->
            <div class="form-group" th:if="${employee.id == null}">
                <label for="resumeFile">📎 CV Dosyası (isteğe bağlı)</label>
                <input type="file" id="resumeFile" name="resumeFile"
                       accept=".pdf,.doc,.docx"
                       style="padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 6px; width: 100%;">
                <small style="color: #718096; margin-top: 0.3rem; display: block;">
                    PDF, DOC veya DOCX formatında CV yükleyebilirsiniz. MinIO'ya yüklenir ve RabbitMQ ile işlenir.
                </small>
            </div>

            <div style="display: flex; gap: 0.8rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary"
                        th:text="${employee.id != null} ? 'Güncelle' : 'Kaydet'">Kaydet</button>
                <a th:href="@{/employees}" class="btn btn-danger">İptal</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
