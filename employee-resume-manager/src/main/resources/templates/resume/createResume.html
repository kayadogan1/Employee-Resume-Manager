<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CV Yukle')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="card">
        <h1>CV YÜKLE</h1>

        <form th:action="@{/upload}" th:object="${candidate}" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="name">Ad</label>
                <input type="text" id="name" th:field="*{name}">
            </div>

            <div class="form-group">
                <label for="lastName">Soyad</label>
                <input type="text" id="lastName" th:field="*{lastName}">
            </div>

            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" th:field="*{email}">
            </div>

            <div class="form-group">
                <label for="linkedinUrl">LinkedIn</label>
                <input type="text" id="linkedinUrl" th:field="*{linkedinUrl}">
            </div>

            <div class="form-group">
                <label for="motivationMessage">Motivasyon mesajı</label>
                <textarea id="motivationMessage" th:field="*{motivationMessage}"></textarea>
            </div>

            <div class="form-group">
                <label for="resumeFile">📎 CV Dosyası</label>
                <input type="file" id="resumeFile" name="resumeFile" accept=".pdf">
                <small> sadece PDF olacak şekilde yükleyin.</small>
            </div>

            <button type="submit">Yükle</button>
        </form>
    </div>
</div>
</body>
</html>
